<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Fallbacks */
            --bg-base: #f4f6f8;
            --bg-surface: #ffffff;
            --text-main: #212b36;
            --text-muted: #637381;
            --accent: #2065d1;
            --shadow: 0 8px 24px rgba(145, 158, 171, 0.12);
            --border: #dfe3e8;
        }

        .theme-dark {
            /* Dark Theme Fallbacks */
            --bg-base: #161c24;
            --bg-surface: #212b36;
            --text-main: #f9fafb;
            --text-muted: #919eab;
            --accent: #3366ff;
            --shadow: 0 16px 32px rgba(0, 0, 0, 0.24);
            --border: #333d48;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        .loading-container {
            text-align: center;
            background: var(--bg-surface);
            padding: 40px 48px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .logo-wrapper {
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(51, 102, 255, 0.08);
            border: 1px solid rgba(51, 102, 255, 0.15);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .brand-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .brand-accent {
            color: var(--accent);
        }

        .spinner-container {
            position: relative;
            width: 48px;
            height: 48px;
            margin: 8px 0;
        }

        .spinner {
            box-sizing: border-box;
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid rgba(51, 102, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        .status-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }

        .hint-text {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(8px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulseGlow {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(51, 102, 255, 0.2);
            }
            50% {
                transform: scale(1.04);
                box-shadow: 0 0 16px 4px rgba(51, 102, 255, 0.15);
            }
        }
    </style>
</head>
<body class="theme-dark">
    <div class="loading-container">
        <div class="logo-wrapper">
            🏦
        </div>
        <div>
            <h1 class="brand-title">OmniBank <span class="brand-accent">Local</span></h1>
            <p class="hint-text" id="loading-hint">Connexion sécurisée en cours...</p>
        </div>
        <div class="spinner-container">
            <div class="spinner"></div>
        </div>
        <div class="status-text" id="loading-status">
            Démarrage du moteur local...
        </div>
    </div>

    <script>
        // Apply theme preference immediately
        const savedTheme = localStorage.getItem('omni_theme') || 'dark';
        if (savedTheme === 'dark') {
            document.body.classList.add('theme-dark');
        } else {
            document.body.classList.remove('theme-dark');
        }

        // Apply language translation
        const lang = localStorage.getItem('omni_lang') || 'fr';
        const translations = {
            fr: {
                title: "Démarrage d'OmniBank",
                status: "Démarrage du moteur local...",
                hint: "Connexion sécurisée en cours..."
            },
            en: {
                title: "Starting OmniBank",
                status: "Starting local engine...",
                hint: "Establishing secure connection..."
            }
        };
        const t = translations[lang] || translations['fr'];
        document.getElementById('loading-status').textContent = t.status;
        document.getElementById('loading-hint').textContent = t.hint;
        document.title = t.title;
    </script>
</body>
</html>
